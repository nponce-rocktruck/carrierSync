name: Deploy to Production

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY_PROD }}
          project_id: carriersync-prod
          export_default_credentials: true

      - name: Create env.prod.yaml from secret
        run: |
          echo '${{ secrets.ENV_PROD_YAML }}' > env.prod.yaml
        if: ${{ secrets.ENV_PROD_YAML != '' }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy carriersync-prod \
            --source . \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars-from-file env.prod.yaml \
            --memory=1Gi \
            --cpu=1 \
            --timeout=300 \
            --max-instances=10 \
            --min-instances=1 \
            --port=8080 \
            --quiet

      - name: Health Check
        run: |
          URL=$(gcloud run services describe carriersync-prod --region us-central1 --format 'value(status.url)')
          sleep 10
          curl -f $URL/health || exit 1

      - name: Notify
        if: success()
        run: echo "Despliegue a produccion completado"
