name: Deploy to Development

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY_DEV }}
          project_id: carriersync-dev
          export_default_credentials: true

      - name: Create env.dev.yaml from secret
        run: |
          echo '${{ secrets.ENV_DEV_YAML }}' > env.dev.yaml
        if: ${{ secrets.ENV_DEV_YAML != '' }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy carriersync-dev \
            --source . \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars-from-file env.dev.yaml \
            --memory=1Gi \
            --cpu=1 \
            --timeout=300 \
            --max-instances=10 \
            --min-instances=0 \
            --port=8080 \
            --quiet

      - name: Health Check
        run: |
          URL=$(gcloud run services describe carriersync-dev --region us-central1 --format 'value(status.url)')
          sleep 10
          curl -f $URL/health || exit 1
